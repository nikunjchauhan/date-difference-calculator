<!DOCTYPE html>
<html>
<head>
    <title>Date Difference Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
        }
        input, button {
            margin: 10px 0;
            padding: 8px;
            width: 100%;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Date Difference Calculator</h2>

    <label>Start Date:</label>
    <input type="date" id="startDate">

    <label>End Date:</label>
    <input type="date" id="endDate">

    <button onclick="calculateDifference()">Calculate</button>

    <div id="result"></div>

    <script>
        function calculateDifference() {
            const startDate = new Date(document.getElementById("startDate").value);
            const endDate = new Date(document.getElementById("endDate").value);

            if (!startDate || !endDate || isNaN(startDate) || isNaN(endDate)) {
                document.getElementById("result").innerHTML = "Please select both dates.";
                return;
            }

            if (endDate < startDate) {
                document.getElementById("result").innerHTML = "End date must be after start date.";
                return;
            }

            let years = endDate.getFullYear() - startDate.getFullYear();
            let months = endDate.getMonth() - startDate.getMonth();
            let days = endDate.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const previousMonth = new Date(
                    endDate.getFullYear(),
                    endDate.getMonth(),
                    0
                );
                days += previousMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById("result").innerHTML =
                `${years} Year(s), ${months} Month(s), ${days} Day(s)`;
        }
    </script>

</body>
</html>
